<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:0;
}

.hero{

width:1200px;
height:630px;

background:#f4f4f4;

display:flex;
flex-direction:column;
justify-content:center;

padding:110px;

font-family: Georgia, "Times New Roman", serif;

}

/* abstract structure background */

.hero::before{

content:"";

position:absolute;

width:1200px;
height:630px;

background:

linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);

background-size:80px 80px;

opacity:0.4;

}

.title{

position:relative;

font-size:64px;
line-height:1.15;
font-weight:600;

color:#222;

max-width:900px;

}

.subtitle{

position:relative;

margin-top:35px;

font-size:26px;

color:#555;

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

}

.link{

position:relative;

margin-top:40px;

font-size:20px;

color:#666;

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

}

</style>

</head>

<body>

<div class="hero">

<div class="title">
{{title}}
</div>

<div class="subtitle">
A perspective from Patrik Hallén<br>
Member of Andersen Consulting
</div>

<div class="link">
Explore Andersen Consulting globally
</div>

</div>

</body>
</html>
